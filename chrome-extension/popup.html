<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background-color: #020617;
      color: #ffffff;
      margin: 0;
      padding: 16px;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      border-bottom: 1px solid #1e293b;
      padding-bottom: 12px;
      margin-bottom: 16px;
    }
    .title {
      font-size: 16px;
      font-weight: 800;
      margin: 0;
      background: linear-gradient(to right, #3b82f6, #8b5cf6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .description {
      font-size: 12px;
      color: #94a3b8;
      line-height: 1.5;
      margin-bottom: 16px;
    }
    .btn {
      display: block;
      width: 100%;
      background-color: #2563eb;
      color: white;
      text-align: center;
      padding: 10px 0;
      border-radius: 8px;
      text-decoration: none;
      font-weight: bold;
      font-size: 13px;
      transition: background 0.2s;
    }
    .btn:hover {
      background-color: #1d4ed8;
    }
    .footer {
      font-size: 10px;
      color: #475569;
      text-align: center;
      margin-top: 16px;
    }
  </style>
</head>
<body>
  <div class="header">
    <h3 class="title">Nexaviq Co-Pilot</h3>
  </div>
  <p class="description">
    Connect your browser session to Nexaviq's real-time AI speech processing engine to track checklist compliance live.
  </p>
  <a href="https://www.nexaviq.com/dashboard/agent-assist" target="_blank" class="btn">
    Launch Co-Pilot Dashboard
  </a>
  <div class="footer">
    Nexaviq Technologies Pvt. Ltd. • Version 1.0.0
  </div>
</body>
</html>
